<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<title>Технические работы</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		}

		body {
			min-height: 100vh;
			background: #0f0f0f;
			color: #ffffff;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
		}

		.card {
			background: #2b2b2b;
			backdrop-filter: blur(10px);
			border-radius: 20px;
			padding: 40px 30px;
			max-width: 420px;
			width: 100%;
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
			animation: fadeIn 0.8s ease;
		}

		h1 {
			font-size: 28px;
			margin-bottom: 16px;
		}

		p {
			font-size: 16px;
			opacity: 0.85;
			line-height: 1.5;
		}

		.icon {
			margin-bottom: 20px;
			animation: rotate 4s linear infinite;
			display: inline-block;
            width: 64px;
            height: 64px;
		}

		.time {
			margin-top: 24px;
			font-size: 14px;
			opacity: 0.6;
		}

        .time a {
            color: inherit;
            text-decoration: none;
        }

		@keyframes rotate {
			0% { transform: rotate(0deg); }
			100% { transform: rotate(360deg); }
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(10px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>
<body>
	<div class="card">
		<div class="icon">
			<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">

            </svg>
		</div>
		<h1>Технические работы</h1>
		<p>
			Мы временно недоступны.<br>
			Проводим обновление сервиса, чтобы он стал быстрее и стабильнее.
		</p>
		<div class="time">
			<a href="mailto:admin@hoshi.su">admin@hoshi.su</a>
		</div>
	</div>

</html>
