<!DOCTYPE html>
<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Технические работы</title>

	<style>
		:root {
			--bg: #000;
			--text: #f5f5f5;
			--muted: #888;
		}

		* {
			box-sizing: border-box;
		}

		html, body {
			margin: 0;
			height: 100%;
			background: var(--bg);
			color: var(--text);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			overflow: hidden;
		}

		body {
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* NOISE */
		.noise {
			position: fixed;
			inset: 0;
			z-index: 1;
			pointer-events: none;
			opacity: 0.04;
			background-image: url("data:image/svg+xml;base64,PHN2ZyBmaWx0ZXI9Im5vaXNlIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxmaWx0ZXIgaWQ9Im5vaXNlIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45IiBudW1PY3RhdmVzPSIzIi8+PC9maWx0ZXI+PHJlY3QgZmlsdGVyPSJ1cmwoI25vaXNlKSIgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIvPjwvc3ZnPg==");
		}

		.particles {
			position: fixed;
			inset: 0;
			width: 100%;
			height: 100%;
			pointer-events: none;
			z-index: 0;
		}

		/* CONTENT */
		.container {
			position: relative;
			z-index: 2;
			text-align: center;
			max-width: 700px;
			padding: 20px;
		}

		.logo {
			width: clamp(66px, 9vw, 102px);
			margin-bottom: 8px;
			display: block;
			margin-left: auto;
			margin-right: auto;
			color: var(--text);
			filter:
				drop-shadow(0 0 6px rgba(245, 245, 245, 0.14))
				drop-shadow(0 0 18px rgba(245, 245, 245, 0.05));
		}

		h1 {
			font-size: clamp(32px, 6vw, 60px);
			margin: 0 0 12px;
			letter-spacing: -0.03em;
		}

		p {
			font-size: clamp(16px, 2.5vw, 20px);
			color: var(--muted);
			margin: 0;
		}

		.meta {
			margin-top: 18px;
			font-size: 14px;
			color: #666;
		}

		@media (max-width: 768px) {
			.container {
				padding: 24px 20px;
			}

			.logo {
				width: clamp(56px, 14vw, 80px);
			}

			h1 {
				font-size: clamp(26px, 7.5vw, 36px);
			}

			p {
				font-size: clamp(15px, 4vw, 18px);
			}

			.meta {
				font-size: 13px;
			}
		}

	</style>
</head>
<body>

	<canvas class="particles" id="particles" aria-hidden="true"></canvas>
	<div class="noise"></div>

	<div class="container">
		<svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2134.34 1512.14" aria-hidden="true">
			<path fill="currentColor" d="m1313.21,5.89l217.33,367.92c2.19,3.71,6.2,5.96,10.5,5.89l581.1-8.54c12.22-.18,16.85,15.88,6.41,22.24l-421.75,256.76c-5.59,3.4-7.42,10.66-4.11,16.3l282.67,483.02c5.71,9.76-4.01,21.27-14.59,17.28l-681.39-257.37c-3.45-1.3-7.32-.95-10.47.97l-986.7,599.93c-11.03,6.71-23.42-6.36-16.13-17.02l516.47-755.48c4.38-6.41,1.61-15.23-5.65-17.99L7.76,424.75c-12.38-4.69-9.16-23.02,4.08-23.21l1015.12-14.41c3.91-.06,7.55-2.01,9.75-5.25L1292.97,5.25c4.95-7.27,15.77-6.92,20.24.65Z"/>
		</svg>

		<h1>Технические работы</h1>
		<p>Мы уже обновляем сервис. Скоро всё будет доступно.</p>
		<div class="meta">Попробуйте зайти позже</div>
	</div>

	<script>
		const canvas = document.getElementById('particles');
		const ctx = canvas.getContext('2d');

		const particles = [];
		let nextSpawn = 0;
		let width = 0;
		let height = 0;
		let dpr = 1;

		const ANGLE_RAD = (35 * Math.PI) / 180;
		const TAN_ANGLE = Math.tan(ANGLE_RAD);

		function resize() {
			dpr = Math.min(window.devicePixelRatio || 1, 2);
			width = window.innerWidth;
			height = window.innerHeight;
			canvas.width = width * dpr;
			canvas.height = height * dpr;
			canvas.style.width = width + 'px';
			canvas.style.height = height + 'px';
			ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
		}

		function getSpawnPoint() {
			const roll = Math.random();

			if (roll < 0.5) {
				return {
					x: width * (-0.02 + Math.random() * 1.07),
					y: 0,
				};
			}

			if (roll < 0.82) {
				return {
					x: width * (1.02 + Math.random() * 0.04),
					y: Math.random() * height * 0.72,
				};
			}

			return {
				x: width * (0.62 + Math.random() * 0.46),
				y: -Math.random() * height * 0.1,
			};
		}

		function spawnParticle() {
			if (!width || !height) return;

			const { x: spawnX, y: spawnY } = getSpawnPoint();
			const exitX = -width * (0.03 + Math.random() * 0.02);
			const dx = exitX - spawnX;
			const dy = (spawnX - exitX) / TAN_ANGLE;
			const pathLen = Math.hypot(dx, dy);
			const refPath = Math.hypot(width * 1.08, (width * 1.08) / TAN_ANGLE);
			const speedCoef = 0.4 + Math.random() * 0.45;
			const baseDuration = 2916 + Math.random() * 1875;

			particles.push({
				x: spawnX,
				y: spawnY,
				dx,
				dy,
				exitX,
				duration: (baseDuration * pathLen / refPath) / speedCoef,
				start: performance.now(),
				opacity: 0.09 + Math.random() * 0.1,
				size: 1.1 + Math.random() * 1.4,
				tail: 18 + Math.random() * 22,
			});
		}

		function scheduleSpawn(now) {
			if (now < nextSpawn) return;
			spawnParticle();
			nextSpawn = now + 80 + Math.random() * 67;
		}

		function drawParticle(p, now) {
			const elapsed = now - p.start;
			const t = Math.min(1, elapsed / p.duration);
			const progress = t;

			const x = p.x + p.dx * progress;
			const y = p.y + p.dy * progress;

			if (x <= p.exitX) return false;
			if (elapsed >= p.duration + 500) return false;

			const len = Math.hypot(p.dx, p.dy) || 1;
			const tailLen = p.tail * (0.35 + (1 - t) * 0.65);
			const x0 = x - (p.dx / len) * tailLen;
			const y0 = y - (p.dy / len) * tailLen;

			const fade = t < 0.18 ? t / 0.18 : 1;
			const alpha = p.opacity * fade;

			ctx.strokeStyle = `rgba(245, 245, 245, ${alpha})`;
			ctx.lineWidth = p.size;
			ctx.lineCap = 'round';
			ctx.beginPath();
			ctx.moveTo(x0, y0);
			ctx.lineTo(x, y);
			ctx.stroke();

			ctx.fillStyle = `rgba(245, 245, 245, ${alpha})`;
			ctx.beginPath();
			ctx.arc(x, y, p.size * 0.45, 0, Math.PI * 2);
			ctx.fill();

			return true;
		}

		function tick(now) {
			scheduleSpawn(now);

			ctx.clearRect(0, 0, width, height);

			for (let i = particles.length - 1; i >= 0; i--) {
				if (!drawParticle(particles[i], now)) {
					particles.splice(i, 1);
				}
			}

			requestAnimationFrame(tick);
		}

		resize();
		window.addEventListener('resize', resize);
		requestAnimationFrame(tick);
	</script>



</body>
</html>
