<!DOCTYPE html>
<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
	
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Технические работы</title>

	<style>
		:root {
			--bg: #000;
			--text: #f5f5f5;
			--muted: #888;
		}

		* {
			box-sizing: border-box;
		}

		html, body {
			margin: 0;
			height: 100%;
			background: var(--bg);
			color: var(--text);
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			overflow: hidden;
		}

		body {
			display: flex;
			align-items: center;
			justify-content: center;
		}

		/* NOISE */
		.noise {
			position: fixed;
			inset: 0;
			pointer-events: none;
			opacity: 0.04;
			background-image: url("data:image/svg+xml;base64,PHN2ZyBmaWx0ZXI9Im5vaXNlIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPjxmaWx0ZXIgaWQ9Im5vaXNlIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iMC45IiBudW1PY3RhdmVzPSIzIi8+PC9maWx0ZXI+PHJlY3QgZmlsdGVyPSJ1cmwoI25vaXNlKSIgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIvPjwvc3ZnPg==");
		}

		/* PARALLAX BLOBS */
		.blob {
			position: fixed;
			width: 47.6vmin;
			height: 47.6vmin;
			border-radius: 50%;
			filter: blur(10.2vmin);
			opacity: 0.12;
			pointer-events: none;
			will-change: transform;
		}

		.blob1 {
			background: white;
			top: 10%;
			left: 10%;
		}

		.blob2 {
			background: white;
			bottom: 10%;
			right: 10%;
		}

		/* CONTENT */
		.container {
			position: relative;
			text-align: center;
			max-width: 700px;
			padding: 20px;
		}

		.logo {
			width: clamp(66px, 9vw, 102px);
			margin-bottom: 8px;
			display: block;
			margin-left: auto;
			margin-right: auto;
			color: var(--text);
			filter:
				drop-shadow(0 0 6px rgba(245, 245, 245, 0.14))
				drop-shadow(0 0 18px rgba(245, 245, 245, 0.05));
		}

		h1 {
			font-size: clamp(32px, 6vw, 60px);
			margin: 0 0 12px;
			letter-spacing: -0.03em;
		}

		p {
			font-size: clamp(16px, 2.5vw, 20px);
			color: var(--muted);
			margin: 0;
		}

		.meta {
			margin-top: 18px;
			font-size: 14px;
			color: #666;
		}

	</style>
</head>
<body>

	<div class="noise"></div>
	<div class="blob blob1" id="b1"></div>
	<div class="blob blob2" id="b2"></div>

	<div class="container">
		<svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2134.34 1512.14" aria-hidden="true">
			<path fill="currentColor" d="m1313.21,5.89l217.33,367.92c2.19,3.71,6.2,5.96,10.5,5.89l581.1-8.54c12.22-.18,16.85,15.88,6.41,22.24l-421.75,256.76c-5.59,3.4-7.42,10.66-4.11,16.3l282.67,483.02c5.71,9.76-4.01,21.27-14.59,17.28l-681.39-257.37c-3.45-1.3-7.32-.95-10.47.97l-986.7,599.93c-11.03,6.71-23.42-6.36-16.13-17.02l516.47-755.48c4.38-6.41,1.61-15.23-5.65-17.99L7.76,424.75c-12.38-4.69-9.16-23.02,4.08-23.21l1015.12-14.41c3.91-.06,7.55-2.01,9.75-5.25L1292.97,5.25c4.95-7.27,15.77-6.92,20.24.65Z"/>
		</svg>

		<h1>Технические работы</h1>
		<p>Мы уже обновляем сервис. Скоро всё будет доступно.</p>
		<div class="meta">Попробуйте зайти позже</div>
	</div>

	<script>
		const b1 = document.getElementById('b1');
		const b2 = document.getElementById('b2');

		const CURSOR_STRENGTH = 15; // % экрана (×1.5)
		const PULSE_PERIOD = 16;    // сек: 95% → 100% → 95% (×2 медленнее)
		const SMOOTH = 0.0175;      // плавность (×2 медленнее)

		let mx = 0;
		let my = 0;
		let tmx = 0;
		let tmy = 0;
		let s1x = 0, s1y = 0, s2x = 0, s2y = 0;
		let s1 = 0.975, s2 = 0.975;

		document.addEventListener('mousemove', (e) => {
			tmx = (e.clientX / window.innerWidth - 0.5) * 2;
			tmy = (e.clientY / window.innerHeight - 0.5) * 2;
		});

		function lerp(a, b, t) {
			return a + (b - a) * t;
		}

		function pulseScale(time, phase = 0) {
			return 0.975 + 0.025 * Math.sin(time * (Math.PI * 2 / PULSE_PERIOD) + phase);
		}

		function tick() {
			const time = performance.now() * 0.001;

			mx = lerp(mx, tmx, SMOOTH);
			my = lerp(my, tmy, SMOOTH);

			const c1x = mx * CURSOR_STRENGTH;
			const c1y = my * CURSOR_STRENGTH;
			const c2x = -mx * CURSOR_STRENGTH;
			const c2y = -my * CURSOR_STRENGTH;

			s1x = lerp(s1x, c1x, SMOOTH);
			s1y = lerp(s1y, c1y, SMOOTH);
			s2x = lerp(s2x, c2x, SMOOTH);
			s2y = lerp(s2y, c2y, SMOOTH);

			const targetScale = pulseScale(time);
			const targetScale2 = pulseScale(time, Math.PI);
			s1 = lerp(s1, targetScale, SMOOTH);
			s2 = lerp(s2, targetScale2, SMOOTH);

			b1.style.transform = `translate(${s1x}vw, ${s1y}vh) scale(${s1})`;
			b2.style.transform = `translate(${s2x}vw, ${s2y}vh) scale(${s2})`;

			requestAnimationFrame(tick);
		}

		requestAnimationFrame(tick);
	</script>



</body>
</html>
